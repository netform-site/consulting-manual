<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술컨설팅 - 넷폼알앤디</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gray-50: #fafbfc;
  --gray-100: #f4f5f7;
  --gray-200: #e8eaed;
  --gray-300: #d1d5db;
  --gray-400: #9ca3af;
  --gray-500: #6b7280;
  --gray-600: #4b5563;
  --gray-700: #374151;
  --gray-800: #1f2937;
  --white: #ffffff;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #f0f4f8 0%, #dfe6ed 100%);
  color: var(--gray-700);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header {
  background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
  color: white;
  width: 100%;
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-logo { font-size: 2rem; margin-bottom: 0.3rem; }
.header-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
.header-sub { font-size: 0.8rem; opacity: 0.6; margin-top: 0.3rem; }

.container {
  max-width: 500px;
  width: 100%;
  padding: 1.5rem 1rem;
  flex: 1;
}

.section-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray-400);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 1.2rem 0 0.6rem 0.3rem;
}
.section-label:first-child { margin-top: 0; }

.card-link {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: white;
  border-radius: var(--radius);
  padding: 1.2rem 1.3rem;
  margin-bottom: 0.7rem;
  text-decoration: none;
  color: var(--gray-700);
  box-shadow: var(--shadow);
  transition: all 0.2s;
  border: 2px solid transparent;
}
.card-link:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: #1565c0;
}
.card-link:active { transform: scale(0.98); }

.card-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}
.card-icon.blue { background: #e3f2fd; }
.card-icon.orange { background: #fff3e0; }
.card-icon.green { background: #e8f5e9; }
.card-icon.purple { background: #f3e5f5; }

.card-info { flex: 1; }
.card-title { font-size: 1rem; font-weight: 700; color: var(--gray-800); margin-bottom: 0.15rem; }
.card-desc { font-size: 0.78rem; color: var(--gray-500); line-height: 1.4; }
.card-arrow { color: var(--gray-300); font-size: 1.2rem; }

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  text-decoration: none;
  color: var(--gray-500);
  font-size: 0.8rem;
  margin-top: 1rem;
  padding: 0.5rem 0;
}
.back-link:hover { color: var(--gray-700); }

.footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 0.7rem;
  color: var(--gray-400);
}

@media (max-width: 480px) {
  .header { padding: 1.5rem 1rem 1.2rem; }
  .header-title { font-size: 1.2rem; }
  .card-link { padding: 1rem; }
  .card-icon { width: 46px; height: 46px; font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">&#128214;</div>
  <div class="header-title">기술컨설팅</div>
  <div class="header-sub">기술 자문 컨설팅 업무 시스템</div>
</div>

<div class="container">

  <div class="section-label">매뉴얼</div>

  <a class="card-link" href="https://netform-site.github.io/consulting-manual/기술컨설팅_계약서_매뉴얼.html">
    <div class="card-icon blue">&#128203;</div>
    <div class="card-info">
      <div class="card-title">계약서 매뉴얼</div>
      <div class="card-desc">기술자문컨설팅 전체 프로세스 가이드 (15개 섹션)</div>
    </div>
    <div class="card-arrow">&#10095;</div>
  </a>

  <div class="section-label">회의자료</div>

  <a class="card-link" href="https://netform-site.github.io/consulting-manual/기술컨설팅_인수인계_회의자료.html">
    <div class="card-icon purple">&#128221;</div>
    <div class="card-info">
      <div class="card-title">인수인계 회의자료</div>
      <div class="card-desc">담당자 인수인계용 상세 설명 자료</div>
    </div>
    <div class="card-arrow">&#10095;</div>
  </a>

  <div class="section-label">협의자료</div>

  <a class="card-link" href="https://netform-site.github.io/consulting-manual/기술자문_서비스분류_체크리스트.html">
    <div class="card-icon green">&#9989;</div>
    <div class="card-info">
      <div class="card-title">서비스 분류 체크리스트</div>
      <div class="card-desc">기술자문 / 직영 / POUR 서비스 분류 (대표 협의용)</div>
    </div>
    <div class="card-arrow">&#10095;</div>
  </a>

  <div class="section-label">매출흐름</div>

  <a class="card-link" href="https://netform-site.github.io/consulting-manual/기술자문료_매출흐름_회의자료.html">
    <div class="card-icon blue">&#128202;</div>
    <div class="card-info">
      <div class="card-title">매출 흐름 회의자료</div>
      <div class="card-desc">영업 → 체결 → 정산 전체 프로세스 (팀 공유용)</div>
    </div>
    <div class="card-arrow">&#10095;</div>
  </a>

  <div class="section-label">제안서</div>

  <a class="card-link" href="https://netform-site.github.io/consulting-manual/영업이사_서비스제안서.html">
    <div class="card-icon orange">&#128188;</div>
    <div class="card-info">
      <div class="card-title">서비스 제안서</div>
      <div class="card-desc">기술자문 컨설팅 서비스 제안서 (영업이사용)</div>
    </div>
    <div class="card-arrow">&#10095;</div>
  </a>

  <a class="back-link" href="../portal.html">&#8592; 포탈로 돌아가기</a>

</div>

<div class="footer">
  &copy; 2026 넷폼알앤디. All rights reserved.
</div>

</body>
</html>
